services:
  poste:
    image: analogic/poste.io
    container_name: mailserver
    restart: always
    ports:
      - "25:25"      # SMTP
      - "465:465"    # SMTPS
      - "587:587"    # SMTP submission
      - "110:110"    # POP3
      - "995:995"    # POP3S
      - "143:143"    # IMAP
      - "993:993"    # IMAPS
      - "8080:80"    # Interfaz web en puerto alternativo
    volumes:
      - /srv/poste/data:/data
    environment:
      - HTTPS=OFF